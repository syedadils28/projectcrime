<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Navbar Dropdown</title>

<link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#081b29;
}

/* NAVBAR */
.navbar{
    display:flex;
    align-items:center;
    gap:20px;
    padding:15px 40px;
    background:#112e42;
}

.navbar a{
    color:#fff;
    text-decoration:none;
    display:flex;
    align-items:center;
    gap:6px;
    font-size:15px;
    transition:0.3s;
}

.navbar a:hover{
    color:#00abf0;
}

/* DROPDOWN */
.dropdown{
    position:relative;
}

.dropbtn{
    cursor:pointer;
}

.dropdown-content{
    display:none;
    position:absolute;
    top:100%;
    left:0;
    background:#112e42;
    min-width:190px;
    border-radius:8px;
    overflow:hidden;
    box-shadow:0 5px 15px rgba(0,0,0,0.3);
    z-index:1000;
}

.dropdown-content li{
    list-style:none;
}

.dropdown-content li a{
    display:block;
    padding:12px 15px;
    color:#fff;
    transition:0.3s;
}

.dropdown-content li a:hover{
    background:#00abf0;
}

/* Show when active */
.dropdown-content.show{
    display:block;
}
</style>
</head>
<body>

<nav class="navbar">
    <a href="#home"><i class='bx bx-home'></i> Home</a>
    <a href="#about"><i class='bx bx-user'></i> About</a>
    <a href="#services"><i class='bx bxs-briefcase'></i> Services</a>
    <a href="#portfolio"><i class='bx bxs-award'></i> Gallery</a>
    <a href="#team"><i class='bx bxs-group'></i> Team</a>
    <a href="#contact"><i class='bx bx-envelope'></i> Contact</a>

    <!-- LOGIN DROPDOWN -->
    <div class="dropdown">
        <a href="#" class="dropbtn">
            <i class='bx bx-log-in'></i> Login
            <i class='bx bx-chevron-down'></i>
        </a>

        <ul class="dropdown-content">
            <li><a href="reports/index.php">
                <i class='bx bx-user'></i> User Login
            </a></li>

            <li><a href="report/index.php">
                <i class='bx bx-shield'></i> Police Login
            </a></li>

            <li><a href="admin/index.php">
                <i class='bx bx-lock-alt'></i> Admin Login
            </a></li>
        </ul>
    </div>
</nav>

<script>
// Toggle dropdown on click
const dropBtn = document.querySelector('.dropbtn');
const dropdown = document.querySelector('.dropdown-content');

dropBtn.addEventListener('click', function(e){
    e.preventDefault();
    dropdown.classList.toggle('show');
});

// Close when clicking outside
document.addEventListener('click', function(e){
    if(!dropBtn.contains(e.target) && !dropdown.contains(e.target)){
        dropdown.classList.remove('show');
    }
});
</script>

</body>
</html>
