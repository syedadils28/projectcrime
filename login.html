<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login/Signup Form</title>
    <link
      href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Poppins", sans-serif;
        text-decoration: none;
        list-style: none;
      }

      body {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background: linear-gradient(90deg, #e2e2e2, #c9d6ff);
      }

      /* ── Wrapper: side panel + main container ── */
      .page-wrapper {
        display: flex;
        align-items: stretch;
        gap: 12px;
      }

      /* ── Left selector panel ── */
      .login-selector {
        display: flex;
        flex-direction: column;
        gap: 10px;
        justify-content: center;
      }

      .selector-btn {
        width: 110px;
        height: 72px;
        background: #fff;
        border: 2px solid #d0d8f5;
        border-radius: 14px;
        cursor: pointer;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 6px;
        font-size: 13px;
        font-weight: 600;
        color: #555;
        box-shadow: 0 2px 12px rgba(116, 148, 236, 0.1);
        transition: all 0.25s ease;
        position: relative;
        overflow: hidden;
      }

      .selector-btn i {
        font-size: 22px;
        color: #7494ec;
        transition: color 0.25s;
      }

      .selector-btn:hover {
        border-color: #7494ec;
        background: #f0f4ff;
        color: #7494ec;
        transform: translateX(3px);
        box-shadow: 0 4px 18px rgba(116, 148, 236, 0.22);
      }

      .selector-btn.active {
        background: #7494ec;
        border-color: #7494ec;
        color: #fff;
        box-shadow: 0 4px 18px rgba(116, 148, 236, 0.35);
      }

      .selector-btn.active i {
        color: #fff;
      }

      .selector-btn.active::after {
        content: "";
        position: absolute;
        right: -6px;
        top: 50%;
        transform: translateY(-50%);
        width: 12px;
        height: 12px;
        background: #7494ec;
        border-radius: 2px;
        rotate: 45deg;
      }

      /* ── Main container ── */
      .container {
        position: relative;
        width: 850px;
        height: 550px;
        background: #fff;
        border-radius: 30px;
        box-shadow: 0 0 30px rgba(0, 0, 0, 0.2);
        overflow: hidden;
      }

      .container h1 {
        font-size: 36px;
        margin: -10px 0;
      }
      .container p {
        font-size: 14.5px;
        margin: 15px 0;
      }

      form {
        width: 100%;
      }

      .form-box {
        position: absolute;
        right: 0;
        width: 50%;
        height: 100%;
        background: #fff;
        display: flex;
        align-items: center;
        color: #333;
        text-align: center;
        padding: 40px;
        z-index: 1;
        transition:
          0.6s ease-in-out 1.2s,
          visibility 0s 1s;
      }

      .container.active .form-box {
        right: 50%;
      }

      .form-box.register {
        visibility: hidden;
      }
      .container.active .form-box.register {
        visibility: visible;
      }

      .input-box {
        position: relative;
        margin: 20px 0;
      }

      .input-box input {
        width: 100%;
        padding: 13px 50px 13px 20px;
        background: #eee;
        border-radius: 8px;
        border: none;
        outline: none;
        font-size: 16px;
        color: #333;
        font-weight: 500;
      }

      .input-box input::placeholder {
        color: #888;
        font-weight: 400;
      }

      .input-box i {
        position: absolute;
        right: 20px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 20px;
      }

      .forgot-link {
        margin: -10px 0 10px;
      }
      .forgot-link a {
        font-size: 14.5px;
        color: #333;
      }

      .btn {
        width: 100%;
        height: 48px;
        background: #7494ec;
        border-radius: 8px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        border: none;
        cursor: pointer;
        font-size: 16px;
        color: #fff;
        font-weight: 600;
        transition: background 0.2s;
      }
      .btn:hover {
        background: #5a7de0;
      }

      .social-icons {
        display: flex;
        justify-content: center;
      }

      .social-icons a {
        display: inline-flex;
        padding: 10px;
        border: 2px solid #ccc;
        border-radius: 8px;
        font-size: 24px;
        color: #333;
        margin: 0 8px;
        transition:
          border-color 0.2s,
          color 0.2s;
      }
      .social-icons a:hover {
        border-color: #7494ec;
        color: #7494ec;
      }

      /* ── Toggle overlay ── */
      .toggle-box {
        position: absolute;
        width: 100%;
        height: 100%;
      }

      .toggle-box::before {
        content: "";
        position: absolute;
        left: -250%;
        width: 300%;
        height: 100%;
        background: #7494ec;
        border-radius: 150px;
        z-index: 2;
        transition: 1.8s ease-in-out;
      }

      .container.active .toggle-box::before {
        left: 50%;
      }

      .toggle-panel {
        position: absolute;
        width: 50%;
        height: 100%;
        color: #fff;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 2;
        transition: 0.6s ease-in-out;
      }

      .toggle-panel.toggle-left {
        left: 0;
        transition-delay: 1.2s;
      }
      .container.active .toggle-panel.toggle-left {
        left: -50%;
        transition-delay: 0.6s;
      }

      .toggle-panel.toggle-right {
        right: -50%;
        transition-delay: 0.6s;
      }
      .container.active .toggle-panel.toggle-right {
        right: 0;
        transition-delay: 1.2s;
      }

      .toggle-panel p {
        margin-bottom: 20px;
      }

      .toggle-panel .btn {
        width: 160px;
        height: 46px;
        background: transparent;
        border: 2px solid #fff;
        box-shadow: none;
        margin-bottom: 10px;
      }
      .toggle-panel .btn:hover {
        background: rgba(255, 255, 255, 0.15);
      }

      /* ── Login-type badge shown inside form area ── */
      .login-type-badge {
        display: inline-block;
        margin-bottom: 8px;
        padding: 3px 14px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.5px;
        background: #eef1fc;
        color: #7494ec;
        transition: opacity 0.3s;
      }

      /* ── Responsive ── */
      @media screen and (max-width: 980px) {
        .page-wrapper {
          flex-direction: column;
          align-items: center;
        }
        .login-selector {
          flex-direction: row;
        }
        .selector-btn.active::after {
          display: none;
        }
      }

      @media screen and (max-width: 650px) {
        .container {
          height: calc(100vh - 140px);
        }
        .form-box {
          bottom: 0;
          width: 100%;
          height: 70%;
        }
        .container.active .form-box {
          right: 0;
          bottom: 30%;
        }
        .toggle-box::before {
          left: 0;
          top: -270%;
          width: 100%;
          height: 300%;
          border-radius: 20vw;
        }
        .container.active .toggle-box::before {
          left: 0;
          top: 70%;
        }
        .container.active .toggle-panel.toggle-left {
          left: 0;
          top: -30%;
        }
        .toggle-panel {
          width: 100%;
          height: 30%;
        }
        .toggle-panel.toggle-left {
          top: 0;
        }
        .toggle-panel.toggle-right {
          right: 0;
          bottom: -30%;
        }
        .container.active .toggle-panel.toggle-right {
          bottom: 0;
        }
      }
    </style>
  </head>
  <body>
    <div class="page-wrapper">
      <!-- ── Left selector panel ── -->
      <div class="login-selector">
        <button
          class="selector-btn active"
          id="btn-user"
          onclick="setLoginType('user')"
        >
          <i class="bx bxs-user-circle"></i>
          User Login
        </button>
        <button
          class="selector-btn"
          id="btn-other"
          onclick="setLoginType('other')"
        >
          <i class="bx bxs-building-house"></i>
          Other Login
        </button>
      </div>

      <!-- ── Main login / register container ── -->
      <div class="container" id="mainContainer">
        <!-- Login form -->
        <div class="form-box login">
          <form action="#">
            <span class="login-type-badge" id="loginBadge">User Login</span>
            <h1>Login</h1>
            <div class="input-box">
              <input type="text" placeholder="Username" required />
              <i class="bx bxs-user"></i>
            </div>
            <div class="input-box">
              <input type="password" placeholder="Password" required />
              <i class="bx bxs-lock-alt"></i>
            </div>
            <div class="forgot-link">
              <a href="#">Forgot Password?</a>
            </div>
            <button type="submit" class="btn">Login</button>
            <p>or login with social platforms</p>
            <div class="social-icons">
              <a href="#"><i class="bx bxl-google"></i></a>
              <a href="#"><i class="bx bxl-facebook"></i></a>
              <a href="#"><i class="bx bxl-github"></i></a>
              <a href="#"><i class="bx bxl-linkedin"></i></a>
            </div>
          </form>
        </div>

        <!-- Register form -->
        <div class="form-box register">
          <form action="#">
            <span class="login-type-badge" id="registerBadge"
              >User Registration</span
            >
            <h1>Registration</h1>
            <div class="input-box">
              <input type="text" placeholder="Username" required />
              <i class="bx bxs-user"></i>
            </div>
            <div class="input-box">
              <input type="email" placeholder="Email" required />
              <i class="bx bxs-envelope"></i>
            </div>
            <div class="input-box">
              <input type="password" placeholder="Password" required />
              <i class="bx bxs-lock-alt"></i>
            </div>
            <button type="submit" class="btn">Register</button>
            <p>or register with social platforms</p>
            <div class="social-icons">
              <a href="#"><i class="bx bxl-google"></i></a>
              <a href="#"><i class="bx bxl-facebook"></i></a>
              <a href="#"><i class="bx bxl-github"></i></a>
              <a href="#"><i class="bx bxl-linkedin"></i></a>
            </div>
          </form>
        </div>

        <!-- Toggle overlay -->
        <div class="toggle-box">
          <div class="toggle-panel toggle-left">
            <h1>Hello, Welcome!</h1>
            <p>Don't have an account?</p>
            <button class="btn register-btn">Register</button>
            <button class="btn home-btn" style="margin-top: 8px">Home</button>
          </div>
          <div class="toggle-panel toggle-right">
            <h1>Welcome Back!</h1>
            <p>Already have an account?</p>
            <button class="btn login-btn">Login</button>
            <button class="btn home-btn" style="margin-top: 8px">Home</button>
          </div>
        </div>
      </div>
      <!-- /.container -->
    </div>
    <!-- /.page-wrapper -->

    <script>
      // ── Toggle login / register ──
      const container = document.getElementById("mainContainer");
      const registerBtn = document.querySelector(".register-btn");
      const loginBtn = document.querySelector(".login-btn");

      registerBtn.addEventListener("click", () =>
        container.classList.add("active"),
      );
      loginBtn.addEventListener("click", () =>
        container.classList.remove("active"),
      );

      // ── Switch login type ──
      let currentType = "user";

      function setLoginType(type) {
        currentType = type;

        // Update selector buttons
        document
          .getElementById("btn-user")
          .classList.toggle("active", type === "user");
        document
          .getElementById("btn-other")
          .classList.toggle("active", type === "other");

        // Update badge text
        const labels = {
          user: { login: "User Login", register: "User Registration" },
          other: { login: "Other Login", register: "Other Registration" },
        };
        document.getElementById("loginBadge").textContent = labels[type].login;
        document.getElementById("registerBadge").textContent =
          labels[type].register;

        // Visual pulse on the container
        container.style.boxShadow =
          type === "other"
            ? "0 0 30px rgba(116,148,236,0.45)"
            : "0 0 30px rgba(0,0,0,0.2)";
      }
    </script>
  </body>
</html>
